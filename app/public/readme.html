<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Documentation</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }

        nav a {
            margin-right: 15px;
        }
    </style>
</head>

<body>
    <nav>
        <a href="/">Home</a>
        <a href="/readme">Documentation</a>
    </nav>
    <div id="content"></div>
    <script>
        fetch('/readme-content')
            .then(res => res.text())
            .then(html => {
                document.getElementById('content').innerHTML = html;
            });
    </script>
</body>

</html>
