name: "Financial Overview"
# Must match server/package.json "version". Supervisor passes BUILD_VERSION to CI Docker builds from this value.
version: "1.3.6"
slug: "bank_scraper"
description: "Financial Overview (מבט כלכלי) — scrape Israeli banks and upload to Google Drive"
url: "https://github.com/yohaybn/Israeli-Financial-Overview"
image: "ghcr.io/yohaybn/israeli-financial-overview-addon-{arch}"
panel_icon: "mdi:finance"
panel_title: "Financial Overview"
startup: application
# Required for Home Assistant s6 base images: Docker's init must not wrap /init, or s6 throws "can only run as pid 1".
init: false
arch:
  - aarch64
  - amd64
  - armv7
ingress: true
# Sidebar / Ingress proxy: Supervisor uses ONLY this static value (it does not read a user "port" from options).
# The app must listen on the same port: ENV PORT=9203 in the Dockerfile, not configurable per install.
ingress_port: 9203
ingress_entry: /
options: {}
schema:
  google_client_id: str?
  google_client_secret: password?
  google_redirect_uri: str?
  drive_folder_id: str?
  gemini_api_key: password?
  telegram_bot_token: password?
  eodhd_api_token: str?
