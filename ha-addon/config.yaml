name: "Financial Overview"
version: &addon_version "1.0.0"
slug: "bank_scraper"
description: "Financial Overview (מבט כלכלי) — scrape Israeli banks and upload to Google Drive"
url: "https://github.com/yohaybn/Israeli-Financial-Overview"
# Dockerfile COPY paths assume the repository root; HA defaults to this folder as context.
build:
  context: ".."
  dockerfile: "Dockerfile"
  args:
    VITE_APP_BUILD_VERSION: *addon_version
startup: application
arch:
  - aarch64
  - amd64
  - armv7
ingress: true
ingress_port: 3000
ingress_entry: /
options:
  oauth_client_id: ""
  oauth_client_secret: ""
  drive_folder_id: ""
schema:
  oauth_client_id: str
  oauth_client_secret: str
  drive_folder_id: str
  oauth_redirect_uri: str?
  app_secret: str?
  google_api_key: str?
