    <style>
        :root {

            text-decoration: none; color: var(--text-muted); font-weight: 500;
            padding: 0.5rem 0.65rem; border-radius: 8px; display: block; font-size: 0.9rem;

        header p { font-size: 1.05rem; color: var(--secondary); }
        section { margin-bottom: 3rem; scroll-margin-top: 5rem; }
        h2 { font-size: 1.45rem; margin-bottom: 1rem; color: #1e293b; border-bottom: 2px solid var(--border); padding-bottom: 0.6rem; }
        h3 { font-size: 1.1rem; margin: 1.25rem 0 0.65rem; color: var(--primary-dark); font-weight: 700; }

        ol.steps { margin: 0 0 1.25rem 1.35rem; }
        ol.steps > li { margin-bottom: 1rem; padding-left: 0.25rem; }
        ol.steps ol { margin: 0.5rem 0 0 1.25rem; list-style: lower-alpha; }

        .callout.warning { background: #fffbeb; border-color: var(--warning); color: #92400e; }
        .callout.success { background: #f0fdf4; border-color: var(--success); color: #166534; }

        .screenshot figcaption { font-size: 0.85rem; color: var(--secondary); margin-top: 0.5rem; }
        .screenshot img {
            max-width: 100%; height: auto; border-radius: 10px; border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);

        html[lang="en"] .only-he { display: none !important; }
        html[lang="he"] .only-en { display: none !important; }
        [dir="rtl"] aside { border-right: none; border-left: 1px solid var(--border); right: 0; left: auto; }
        [dir="rtl"] main { margin-left: 0; margin-right: var(--sidebar-width); }
        [dir="rtl"] .callout { border-left: none; border-right: 4px solid; }
        [dir="rtl"] ol.steps, [dir="rtl"] ul { margin-right: 1.35rem; margin-left: 0; }
        @media (max-width: 960px) {
            aside { display: none; }

                        html: '<p>This guide is for the <strong>Windows installer</strong> — the single setup file <code>FinancialOverview-Windows-Setup-&lt;version&gt;.exe</code> on <a href="' + REPO + '/releases" target="_blank" rel="noopener">GitHub Releases</a> (the version in the filename matches the release). The installer deploys the <strong>Financial Overview</strong> desktop application (<code>FinancialOverview.exe</code>, Electron) that starts the local server and shows the UI in a window. Optional browser or console workflows use <code>resources\\open-browser.cmd</code> and <code>resources\\launch-FinancialOverview.cmd</code> next to the installed app.</p>' +

                        title: 'Step 3 — Tray icon & background operation',
                        html: '<p>The <strong>scheduler</strong> (automatic scrapes) and <strong>Telegram bot</strong> run inside the <strong>Node server</strong>, not inside the browser tab. So the server must keep running for those features to work.</p>' +

                            '<li><strong>Close to tray:</strong> Same behavior as the first-run dialog and tray menu—keep the server running when you close the window so scheduler and Telegram stay active. Use <strong>Quit (stop server)</strong> from the tray to exit fully.</li>' +

                            '<li><strong>Get API key.</strong> On the AI Studio home screen, click <strong>Get API key</strong> (sidebar or top area). If this is your first key, choose <strong>Create API key in new project</strong> (wording may vary slightly).</li>' +

                            '<ol class="steps">' +
                            '<li><strong>New project.</strong> In the <a href="https://console.cloud.google.com/" target="_blank" rel="noopener">Google Cloud Console</a>, create a project (project menu → New Project).</li>' +
                            '<li><strong>Enable APIs.</strong> <em>APIs &amp; Services</em> → <em>Library</em>: enable <strong>Google Drive API</strong> and <strong>Google Sheets API</strong>.</li>' +
                            '<li><strong>OAuth consent screen.</strong> <em>APIs &amp; Services</em> → <em>OAuth consent screen</em> → typically <strong>External</strong>; fill app name and contact emails; you can continue through Scopes and Test users with defaults for personal use.</li>' +

                    'google-drive': {
                        title: 'שלב 6: חיבור לגוגל (אופציונלי)',
                        html: '<div class="callout info"><strong>זה אופציונלי לגמרי:</strong> החיבור של גוגל (OAuth) נחוץ אך ורק אם אתם רוצים <strong>לסנכרן נתונים ל-Google Sheets</strong> או <strong>לגבות את המערכת ל-Google Drive</strong>. התהליך פה טיפה ארוך, אז אפשר לגמרי <strong>לדלג על זה עכשיו</strong> ולהשתמש במערכת כרגיל. תמיד תוכלו לחזור לזה מתוך ה<strong>הגדרות</strong> כשתרגישו צורך.</div>' +

                            '<li><strong>מדליקים את הגישה.</strong> בתפריט הצד לחצו על <em>APIs &amp; Services</em> ואז על <em>Library</em>. חפשו שם את <strong>Google Drive API</strong> ואת <strong>Google Sheets API</strong> והפעילו אותם.</li>' +
                            '<li><strong>יוצרים מסך הסכמה.</strong> תחת <em>APIs &amp; Services</em> היכנסו ל-<em>OAuth consent screen</em>. לרוב תבחרו ב-<strong>External</strong>. מלאו את השם של האפליקציה וכתובות המייל, ובשאר המסכים פשוט תמשיכו הלאה (הגדרות ברירת המחדל מספיקות לשימוש אישי).</li>' +

                            '<li><strong>מעתיקים למערכת.</strong> גוגל תיתן לכם <strong>Client ID</strong> ו-<strong>Client Secret</strong>. חזרו לאפליקציה שלנו, לכו ל-<strong>הגדרות → גוגל</strong> והדביקו אותם שם. ודאו גם ששדה ה-<code>GOOGLE_REDIRECT_URI</code> תואם בול למה ששמתם בגוגל. שמרו הכל, אולי תצטרכו לעשות ריסטארט קטן לשרת, וזהו! אתם מחוברים.</li>' +

                            '</ol>' +
                            '<div class="callout warning"><strong>גוגל אומרת שהאפליקציה לא מאומתת ("Google hasn’t verified this app")?</strong> זה תמיד קורה כשפותחים פרויקט אישי. פשוט לחצו על <strong>Advanced</strong> (מתקדם) ואז על <strong>Go to … (unsafe)</strong> כדי להמשיך בשלום.</div>'

                }
            }
        };

        let currentLang = localStorage.getItem('installGuideLang') || 'en';

        const sectionOrder = ['overview', 'windows-install', 'run-ui', 'desktop-tray', 'first-setup', 'gemini-key', 'google-drive'];

        function render() {
            const data = content[currentLang];
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('lang-label').textContent = currentLang === 'en' ? 'עברית' : 'English';
            document.getElementById('nav-brand').textContent = data.brand;

            const navHtml = data.nav.map(function (group) {
                return '<div class="nav-group"><div class="nav-label">' + group.label + '</div><ul>' +
                    group.items.map(function (item) {
                        return '<li><a href="#' + item.id + '">' + item.label + '</a></li>';
                    }).join('') + '</ul></div>';
            }).join('');
            document.getElementById('sidebar-nav').innerHTML = navHtml;

            let mainHtml = '<header><h1>' + data.title + '</h1><p>' + data.subtitle + '</p></header>';
            sectionOrder.forEach(function (key) {
                const sec = data.sections[key];
                if (!sec) return;
                mainHtml += '<section id="' + key + '"><h2>' + sec.title + '</h2>' + sec.html + '</section>';
            });
            document.getElementById('main-content').innerHTML = mainHtml;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            localStorage.setItem('installGuideLang', currentLang);
            render();
        }

        render();

        document.addEventListener('click', function (e) {
            const a = e.target.closest('a');
            if (a && a.hash && a.pathname === location.pathname) {
                e.preventDefault();
                const target = document.querySelector(a.hash);
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>
</body>
</html>
