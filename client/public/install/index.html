    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --secondary: #64748b;

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', 'Assistant', sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.65; }
        .top-bar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 1001;
            display: flex; align-items: center; justify-content: flex-end; gap: 0.75rem;
            padding: 0.75rem 1rem; background: rgba(248, 250, 252, 0.92); backdrop-filter: blur(8px);

        .lang-switcher {
            background: var(--card-bg); border: 1px solid var(--border);
            padding: 0.55rem 1.1rem; border-radius: 9999px; cursor: pointer;
            font-weight: 700; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .lang-switcher:hover { border-color: var(--primary); }
        [dir="rtl"] .top-bar { flex-direction: row-reverse; }
        [dir="rtl"] .lang-switcher { margin-left: 0; margin-right: auto; }
        .wrapper { display: flex; min-height: 100vh; padding-top: 3.25rem; }
        aside {
            width: var(--sidebar-width); background: var(--card-bg);
            border-right: 1px solid var(--border); padding: 1.5rem 1.25rem;
            position: fixed; top: 3.25rem; height: calc(100vh - 3.25rem); overflow-y: auto; z-index: 50;

        .nav-logo { font-size: 1.15rem; font-weight: 800; color: var(--primary); margin-bottom: 1.5rem; }
        nav .nav-group { margin-bottom: 1.25rem; }
        nav .nav-label { font-size: 0.65rem; font-weight: 800; color: var(--secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; padding-left: 0.35rem; }
        nav ul { list-style: none; }
        nav ul li a {
            text-decoration: none; color: var(--text-muted); font-weight: 500;
            padding: 0.5rem 0.65rem; border-radius: 8px; display: block; font-size: 0.9rem;
        }
        nav ul li a:hover { background: #eff6ff; color: var(--primary); }
        main { flex: 1; margin-left: var(--sidebar-width); padding: 2rem 6% 4rem; max-width: 920px; }
        header { margin-bottom: 2.5rem; }
        header h1 { font-size: 2rem; font-weight: 800; color: #0f172a; margin-bottom: 0.75rem; }
        header p { font-size: 1.05rem; color: var(--secondary); }
        section { margin-bottom: 3rem; scroll-margin-top: 5rem; }
        h2 { font-size: 1.45rem; margin-bottom: 1rem; color: #1e293b; border-bottom: 2px solid var(--border); padding-bottom: 0.6rem; }
        h3 { font-size: 1.1rem; margin: 1.25rem 0 0.65rem; color: var(--primary-dark); font-weight: 700; }
        p, li { margin-bottom: 0.75rem; font-size: 1rem; color: #475569; }
        ol.steps { margin: 0 0 1.25rem 1.35rem; }
        ol.steps > li { margin-bottom: 1rem; padding-left: 0.25rem; }
        ol.steps ol { margin: 0.5rem 0 0 1.25rem; list-style: lower-alpha; }
        ul { margin: 0.5rem 0 1rem 1.35rem; }
        .callout { padding: 1rem 1.25rem; border-radius: 10px; margin: 1.25rem 0; border-left: 4px solid; }
        .callout.info { background: #eff6ff; border-color: var(--primary); color: #1e40af; }
        .callout.warning { background: #fffbeb; border-color: var(--warning); color: #92400e; }
        .callout.success { background: #f0fdf4; border-color: var(--success); color: #166534; }
        code { color: #be123c; background: #f1f5f9; padding: 0.15rem 0.4rem; border-radius: 4px; font-family: ui-monospace, monospace; font-size: 0.9em; }
        .screenshot { margin: 1.25rem 0; }
        .screenshot figcaption { font-size: 0.85rem; color: var(--secondary); margin-top: 0.5rem; }
        .screenshot img {
            max-width: 100%; height: auto; border-radius: 10px; border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(15, 23, 42, 0.08);
        }
        .screenshot .missing-img-hint { display: none; font-size: 0.9rem; color: var(--secondary); padding: 0.75rem; background: #f1f5f9; border-radius: 8px; margin-bottom: 0.5rem; }
        .screenshot.no-img .missing-img-hint { display: block; }
        .screenshot.no-img img { display: none; }
        html[lang="en"] .only-he { display: none !important; }
        html[lang="he"] .only-en { display: none !important; }
        [dir="rtl"] aside { border-right: none; border-left: 1px solid var(--border); right: 0; left: auto; }
        [dir="rtl"] main { margin-left: 0; margin-right: var(--sidebar-width); }
        [dir="rtl"] .callout { border-left: none; border-right: 4px solid; }
        [dir="rtl"] ol.steps, [dir="rtl"] ul { margin-right: 1.35rem; margin-left: 0; }
        @media (max-width: 960px) {
            aside { display: none; }
            main { margin: 0 !important; padding: 1.25rem 1rem 3rem; }
        }
    </style>
</head>

    <script>
        const REPO = 'https://github.com/yohaybn/israeli-bank-scraper-docker';

        function imgFigure(src, caption) {
            var esc = String(caption).replace(/"/g, '&quot;');
            var missEn = 'Screenshot not bundled yet. Add PNGs to <code>install/screenshots/</code> (same names as <code>docs/video-guide-screenshots/</code>) or run <code>npm run video-guide:capture</code> and copy files.';
            var missHe = 'צילום מסך עדיין לא נכלל. הוסף קבצי PNG ל־<code>install/screenshots/</code> (אותם שמות כמו ב־<code>docs/video-guide-screenshots/</code>) או הרץ <code>npm run video-guide:capture</code> והעתק קבצים.';
            return '<figure class="screenshot"><div class="missing-img-hint"><span class="only-en">' + missEn + '</span><span class="only-he">' + missHe + '</span></div>' +
                '<img src="' + src + '" alt="' + esc + '" loading="lazy" onerror="this.closest(\'figure\').classList.add(\'no-img\')">' +
                '<figcaption>' + caption + '</figcaption></figure>';
        }

                sections: {

                            '<div class="callout info"><strong>Demo on GitHub Pages:</strong> The main site deployment is a <strong>static demo</strong> with mocked data. Real banking features require the server running on your PC (this installer) or Docker / Home Assistant as described in the repository README.</div>' +
                            '<p><strong>Optional visuals:</strong> Screenshots are loaded from <code>install/screenshots/</code> (same filenames as <code>docs/video-guide-screenshots/</code> in the repo). If an image is missing, the figure is hidden automatically. You can generate them locally with <code>npm run video-guide:capture</code> and copy PNGs into the install folder.</p>'

                    'windows-install': {
                        title: 'Step 1 — Download and install',

                            '<li><strong>Find the release.</strong> Open the repository’s <a href="' + REPO + '/releases" target="_blank" rel="noopener">Releases</a> page and download <code>FinancialOverview-Windows-Setup.exe</code> for the version you want.</li>' +
                            '<li><strong>Run the file.</strong> Double-click the downloaded <code>.exe</code>. If Windows shows a blue <strong>Windows protected your PC</strong> SmartScreen prompt, click <strong>More info</strong>, then <strong>Run anyway</strong>. This is normal for many open-source apps until they are broadly signed.</li>' +
                            '<li><strong>Installer wizard.</strong> Click <strong>Next</strong> through the welcome and license screens. Choose the install folder if offered (default is under your user profile, e.g. <code>%LocalAppData%\\FinancialOverview</code>).</li>' +
                            '<li><strong>Desktop shortcut.</strong> When asked, enable <strong>Create a desktop shortcut</strong> so you can start the app easily later.</li>' +
                            '<li><strong>Finish.</strong> Click <strong>Install</strong>, wait for completion, then <strong>Finish</strong>. You should see shortcuts such as <strong>Financial Overview</strong> and optionally <strong>Open Financial Overview in browser</strong> in the Start menu.</li>' +
                            '</ol>' +
                            '<div class="callout warning"><strong>Note:</strong> The app bundles a portable Node.js runtime and dependencies—you do <strong>not</strong> need to install Node.js separately.</div>'
                    },

                        title: 'Step 2 — Start the server and open the UI',
                        html: '<ol class="steps">' +
                            '<li><strong>Launch.</strong> Double-click the <strong>Financial Overview</strong> desktop or Start menu shortcut. A <strong>console (black) window</strong> opens and stays open while the server runs—this is expected.</li>' +
                            '<li><strong>Wait for startup.</strong> On first launch, dependency checks may take a few seconds. Wait until the console shows that the server is listening (messages mentioning the port, usually <code>3000</code>).</li>' +

                            '<ul><li>Use the second shortcut <strong>Open Financial Overview in browser</strong> after the server has started, or</li>' +
                            '<li>Paste <code>http://127.0.0.1:3000</code> into the address bar, or</li>' +
                            '<li>If the console prints a clickable link, <strong>hold Ctrl</strong> and click the link to open it in your default browser (some terminals require Ctrl+click for http links).</li></ul></li>' +
                            '<li><strong>Port and data folder.</strong> To change port or data directory, edit <code>financial-overview.json</code> in the install folder (see <code>financial-overview.json.example</code> in the repo). Environment variables <code>PORT</code> and <code>DATA_DIR</code> override the file when set.</li>' +
                            '</ol>' +

                        html: '<h3>App lock (password)</h3>' +
                            '<ol class="steps">' +
                            '<li>When the onboarding or <strong>App lock</strong> screen appears, set a <strong>strong password</strong> (minimum length as shown in the UI). This protects your session and is used to derive encryption for <strong>saved bank profiles</strong> on this machine.</li>' +
                            '<li>Confirm the password and continue. If you forget the password, encrypted profiles cannot be recovered—you must remove those profiles and enter bank credentials again after resetting lock (see the in-app Help / <code>GUIDE.html</code>).</li>' +
                            '</ol>' +
                            '<h3>Telegram bot (BotFather)</h3>' +
                            '<ol class="steps">' +
                            '<li>In Telegram, open <a href="https://t.me/BotFather" target="_blank" rel="noopener">@BotFather</a> and tap <strong>Start</strong>.</li>' +
                            '<li>Send <code>/newbot</code>. Follow the prompts to choose a <strong>display name</strong> and a <strong>username</strong> ending in <code>bot</code>.</li>' +
                            '<li>BotFather replies with a long <strong>token</strong> (API key for your bot). Copy it.</li>' +
                            '<li>In Financial Overview, go to <strong>Configuration → Telegram</strong>, paste the token, save, and use <strong>Start</strong> / test as the UI allows. Add your chat ID under notification settings as documented in <a href="' + REPO + '/blob/master/docs/TELEGRAM_BOT_GUIDE.md" target="_blank" rel="noopener">TELEGRAM_BOT_GUIDE.md</a>.</li>' +
                            '</ol>' +
                            imgFigure('screenshots/config-telegram.png', 'Configuration — Telegram tab (example)') +
                            '<p>Full command list and notification behavior: see the Telegram guide linked above.</p>'

                    'gemini-key': {
                        title: 'Step 4 — Gemini API key (Google AI Studio)',
                        html: '<ol class="steps">' +
                            '<li><strong>Open Google AI Studio from the app.</strong> In the onboarding or Configuration area under <strong>Enable AI features</strong>, use the link <strong>Open Google AI Studio to get an API key</strong>. A new browser tab opens.</li>' +
                            '<li><strong>Welcome / consent.</strong> If you see <strong>Welcome to AI Studio</strong> or terms, accept that you are building apps with Google and continue.</li>' +
                            '<li><strong>Get API key.</strong> On the AI Studio home screen, click <strong>Get API key</strong> (sidebar or top area). If this is your first key, choose <strong>Create API key in new project</strong> (wording may vary slightly).</li>' +

                            '<li><strong>Paste in Financial Overview.</strong> Return to <code>http://127.0.0.1:3000</code>, open <strong>Configuration → AI</strong> (or the onboarding step), paste into the <strong>Gemini API key</strong> field, and continue / save.</li>' +

                            '</ol>' +
                            imgFigure('screenshots/config-ai.png', 'Configuration — AI / Gemini (example)') +
                            '<div class="callout info">Optional: Restrict the key to Gemini in Google Cloud and monitor usage in Google AI Studio / Cloud console.</div>'

                nav: [

                        { id: 'windows-install', label: '1. הורדה והתקנה' },
                        { id: 'run-ui', label: '2. שרת ודפדפן' },
                        { id: 'first-setup', label: '3. הגדרות ראשוניות' },
                        { id: 'gemini-key', label: '4. מפתח Gemini' }

                ],
                sections: {
                    overview: {
                        title: 'סקירה',
                        html: '<p>מדריך זה מיועד ל<strong>מתקין Windows</strong> (<code>FinancialOverview-Windows-Setup.exe</code>) שמפורסם ב־<a href="' + REPO + '/releases" target="_blank" rel="noopener">GitHub Releases</a>. הוא מפרט שלב אחר שלב: הורדה, אישור אבטחה של Windows, הפעלה, פתיחת הממשק בדפדפן, הגדרת סיסמה, חיבור טלגרם ו־Gemini, והיכן שימוש בצילומי מסך עוזר.</p>' +
                            '<div class="callout info"><strong>הדגמה ב־GitHub Pages:</strong> האתר המפורסם שם הוא <strong>דמו סטטי</strong> עם נתונים מדומים. יכולות בנקאיות אמיתיות דורשות את השרת על המחשב שלך (מתקין זה) או Docker / Home Assistant כמפורט ב־README של המאגר.</div>' +

                            imgFigure('screenshots/config-telegram.png', 'הגדרות — טלגרם (דוגמה)') +

                    'gemini-key': {
                        title: 'מדריך להוצאת מפתח API עבור Gemini',
                        html: '<ol class="steps">' +

                            imgFigure('screenshots/config-ai.png', 'הגדרות — AI / Gemini (דוגמה)') +
                            '<div class="callout info">אופציונלי: הגבל את המפתח ל־Gemini ב־Google Cloud ועקוב אחר שימוש ב־AI Studio / Cloud.</div>'

            }
        };

        let currentLang = localStorage.getItem('installGuideLang') || 'en';

        const sectionOrder = ['overview', 'windows-install', 'run-ui', 'first-setup', 'gemini-key'];

        function render() {
            const data = content[currentLang];
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.getElementById('lang-label').textContent = currentLang === 'en' ? 'עברית' : 'English';
            document.getElementById('nav-brand').textContent = data.brand;

            const navHtml = data.nav.map(function (group) {
                return '<div class="nav-group"><div class="nav-label">' + group.label + '</div><ul>' +
                    group.items.map(function (item) {
                        return '<li><a href="#' + item.id + '">' + item.label + '</a></li>';
                    }).join('') + '</ul></div>';
            }).join('');
            document.getElementById('sidebar-nav').innerHTML = navHtml;

            let mainHtml = '<header><h1>' + data.title + '</h1><p>' + data.subtitle + '</p></header>';
            sectionOrder.forEach(function (key) {
                const sec = data.sections[key];
                if (!sec) return;
                mainHtml += '<section id="' + key + '"><h2>' + sec.title + '</h2>' + sec.html + '</section>';
            });
            document.getElementById('main-content').innerHTML = mainHtml;
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'he' : 'en';
            localStorage.setItem('installGuideLang', currentLang);
            render();
        }

        render();

        document.addEventListener('click', function (e) {
            const a = e.target.closest('a');
            if (a && a.hash && a.pathname === location.pathname) {
                e.preventDefault();
                const target = document.querySelector(a.hash);
                if (target) target.scrollIntoView({ behavior: 'smooth' });
            }
        });
    </script>

</html>
