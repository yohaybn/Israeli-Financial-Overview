# Builds dist/windows-package, zips it, compiles Inno Setup, uploads artifacts.
# On published release: attaches windows-package.zip and FinancialOverview-Windows-Setup.exe to that release.
name: Windows package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout (release tag when applicable)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Semver for Electron / Inno: use tag v1.2.3 → 1.2.3; branches → 0.0.0-<sanitizedRef>
      - name: Resolve app version from ref
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $sha7 = "${{ github.sha }}".Substring(0, [Math]::Min(7, "${{ github.sha }}".Length))
          if ($ref -match '^v(\d+\.\d+(\.\d+)?(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?)$') {
            $v = $Matches[1]
          } elseif ($ref -match '^(\d+\.\d+(\.\d+)?(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?)$') {
            $v = $ref
          } else {
            $safe = ($ref -replace '[^a-zA-Z0-9.-]', '-').Trim('-')
            if ([string]::IsNullOrWhiteSpace($safe)) { $safe = "ci" }
            $v = "0.0.0-$safe"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APP_VERSION=$v (ref=$ref sha=$sha7)"

      - name: Build Windows package folder
        shell: pwsh
        env:
          CI: "true"
          PUPPETEER_SKIP_DOWNLOAD: "true"
          VITE_INSTALL_KIND: windows
          VITE_APP_BUILD_VERSION: ${{ env.APP_VERSION }}@${{ github.sha }}
        run: npm run windows:package

      - name: Build Electron desktop shell
        shell: pwsh
        env:
          CI: "true"
        run: npm run dist -w desktop-electron -- --config.extraMetadata.version="$env:APP_VERSION"

      - name: Zip windows-package
        shell: pwsh
        run: |
          if (Test-Path dist/windows-package.zip) { Remove-Item dist/windows-package.zip -Force }
          Compress-Archive -Path dist/windows-package -DestinationPath dist/windows-package.zip -CompressionLevel Optimal

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Compile installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw "ISCC.exe not found after Inno Setup install" }
          & $iscc "/DMyAppVersion=$env:APP_VERSION" packaging/windows/FinancialOverview.iss

      - name: Verify outputs
        shell: pwsh
        run: |
          Get-Item dist/windows-package.zip, dist/FinancialOverview-Windows-Setup.exe | Format-Table Name, Length

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/windows-package.zip
            dist/FinancialOverview-Windows-Setup.exe
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release upload "${{ github.event.release.tag_name }}" `
            "dist/windows-package.zip" `
            "dist/FinancialOverview-Windows-Setup.exe" `
            --clobber
