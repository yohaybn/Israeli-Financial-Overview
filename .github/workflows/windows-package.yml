# Builds dist/windows-package, zips it, builds Electron + NSIS installer, uploads artifacts.
# On published release: attaches windows-package.zip and FinancialOverview-Windows-Setup-<version>.exe to that release.
name: Windows package

on:
  workflow_dispatch:
  release:
    types: [published]
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - name: Checkout (release tag when applicable)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      # Semver for Electron / NSIS: use tag v1.2.3 → 1.2.3; branches → 0.0.0-<sanitizedRef>
      - name: Resolve app version from ref
        shell: pwsh
        run: |
          $ref = "${{ github.ref_name }}"
          $sha7 = "${{ github.sha }}".Substring(0, [Math]::Min(7, "${{ github.sha }}".Length))
          if ($ref -match '^v(\d+\.\d+(\.\d+)?(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?)$') {
            $v = $Matches[1]
          } elseif ($ref -match '^(\d+\.\d+(\.\d+)?(-[a-zA-Z0-9.-]+)?(\+[a-zA-Z0-9.-]+)?)$') {
            $v = $ref
          } else {
            $safe = ($ref -replace '[^a-zA-Z0-9.-]', '-').Trim('-')
            if ([string]::IsNullOrWhiteSpace($safe)) { $safe = "ci" }
            $v = "0.0.0-$safe"
          }
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "APP_VERSION=$v (ref=$ref sha=$sha7)"

      - name: Build Windows package folder
        shell: pwsh
        env:
          CI: "true"
          PUPPETEER_SKIP_DOWNLOAD: "true"
          VITE_INSTALL_KIND: windows
          VITE_APP_BUILD_VERSION: ${{ env.APP_VERSION }}@${{ github.sha }}
        run: npm run windows:package

      - name: Inject community submit secret for Electron (optional)
        shell: pwsh
        env:
          COMMUNITY_INSIGHT_RULES_SECRET: ${{ secrets.COMMUNITY_INSIGHT_RULES_SECRET }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:COMMUNITY_INSIGHT_RULES_SECRET)) {
            Write-Host "COMMUNITY_INSIGHT_RULES_SECRET GitHub secret not set; skipping packaged secrets/community-submit.env."
            exit 0
          }
          $dir = Join-Path (Get-Location) "dist/windows-package/secrets"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $path = Join-Path $dir "community-submit.env"
          "COMMUNITY_INSIGHT_RULES_SECRET=$($env:COMMUNITY_INSIGHT_RULES_SECRET)" | Set-Content -Path $path -Encoding utf8NoBOM
          Write-Host "Wrote $path (secret value masked in logs)."

      - name: Ensure app-builder-bin is present (devDependencies pruned during windows package)
        shell: pwsh
        run: |
          $exe = Join-Path (Get-Location) "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Missing $exe — restoring devDependencies (npm install)."
            npm install --no-audit --no-fund
          }
          if (-not (Test-Path $exe)) { throw "app-builder.exe still missing. Run npm install after packaging or keep package.ps1 restore step." }

      - name: Build Electron desktop shell
        shell: pwsh
        env:
          CI: "true"
        run: npm run dist -w desktop-electron -- --config.extraMetadata.version="$env:APP_VERSION"

      - name: Zip windows-package
        shell: pwsh
        run: |
          if (Test-Path dist/windows-package.zip) { Remove-Item dist/windows-package.zip -Force }
          Compress-Archive -Path dist/windows-package -DestinationPath dist/windows-package.zip -CompressionLevel Optimal

      - name: Verify outputs
        shell: pwsh
        run: |
          $setup = "dist/electron-win/FinancialOverview-Windows-Setup-$env:APP_VERSION.exe"
          if (-not (Test-Path $setup)) { throw "Missing NSIS installer: $setup" }
          Get-Item dist/windows-package.zip, $setup | Format-Table Name, Length

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-assets
          path: |
            dist/windows-package.zip
            dist/electron-win/FinancialOverview-Windows-Setup-*.exe
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $setup = Get-Item "dist/electron-win/FinancialOverview-Windows-Setup-*.exe" | Select-Object -First 1
          if (-not $setup) { throw "No FinancialOverview-Windows-Setup-*.exe under dist/electron-win" }
          gh release upload "${{ github.event.release.tag_name }}" `
            "dist/windows-package.zip" `
            "$($setup.FullName)" `
            --clobber
